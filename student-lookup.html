<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بيانات الطالب | مجمع تحفيظ القرآن</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="globalLoader" class="global-loader d-none">
  <div class="spinner-border text-light" role="status"></div>
  <div class="mt-3">جاري البحث...</div>
</div>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-success" href="index.html">
      <i class="fa-solid fa-book-quran ms-2"></i>مجمع تحفيظ القرآن
    </a>
    <a href="index.html" class="btn btn-outline-success btn-sm">
      <i class="fa-solid fa-home ms-1"></i>الرئيسية
    </a>
  </div>
</nav>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-header bg-success text-white rounded-top-4 py-3">
          <h3 class="mb-0 fw-bold"><i class="fa-solid fa-id-card ms-2"></i>بيانات الطالب</h3>
          <small>أدخل هوية الطالب أو رقم جوال ولي الأمر للاستعلام</small>
        </div>
        <div class="card-body p-4">
          <form id="searchForm" class="row g-3">
            <div class="col-md-5">
              <label class="form-label fw-bold">هوية الطالب</label>
              <input type="text" name="studentId" class="form-control" inputmode="numeric">
            </div>
            <div class="col-md-5">
              <label class="form-label fw-bold">رقم جوال ولي الأمر</label>
              <input type="tel" name="guardianPhone" class="form-control" inputmode="numeric">
            </div>
            <div class="col-md-2">
              <label class="form-label">&nbsp;</label>
              <button type="submit" class="btn btn-success w-100"><i class="fa-solid fa-search ms-1"></i>بحث</button>
            </div>
          </form>

          <hr class="my-4">

          <div id="studentResult"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  const API_BASE = API_URL;

  function showLoader(show) {
    const loader = document.getElementById('globalLoader');
    if (show) loader.classList.remove('d-none');
    else loader.classList.add('d-none');
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    try {
      const date = new Date(dateStr);
      return date.toLocaleDateString('ar-SA');
    } catch(e) { return dateStr; }
  }

  function renderStudentData(student) {
    const container = document.getElementById('studentResult');
    if (!student) {
      container.innerHTML = '<div class="alert alert-warning">لم يتم العثور على بيانات الطالب</div>';
      return;
    }

    container.innerHTML = `
      <div class="student-info">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="fw-bold text-success mb-0"><i class="fa-solid fa-user-graduate ms-2"></i>${escapeHtml(student.studentName)}</h4>
          <span class="badge bg-${student.studentStatus === 'منتظم' ? 'success' : 'secondary'} px-3 py-2">${escapeHtml(student.studentStatus || 'مستجد')}</span>
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label"><i class="fa-solid fa-id-card"></i> رقم الهوية</div>
              <div class="info-value">${escapeHtml(student.studentId)}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label"><i class="fa-solid fa-phone"></i> رقم الجوال</div>
              <div class="info-value">${escapeHtml(student.studentPhone)}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label"><i class="fa-solid fa-calendar"></i> تاريخ الميلاد</div>
              <div class="info-value">${formatDate(student.birthDate)}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label"><i class="fa-solid fa-location-dot"></i> العنوان</div>
              <div class="info-value">${escapeHtml(student.address || '-')}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label"><i class="fa-solid fa-graduation-cap"></i> المرحلة</div>
              <div class="info-value">${escapeHtml(student.educationLevel || '-')}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label"><i class="fa-solid fa-school"></i> الصف</div>
              <div class="info-value">${escapeHtml(student.educationGrade || '-')}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label"><i class="fa-solid fa-circle"></i> الحلقة</div>
              <div class="info-value">${escapeHtml(student.circleName || 'غير مسكن')}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label"><i class="fa-solid fa-book"></i> مجموع الحفظ</div>
              <div class="info-value">${escapeHtml(student.totalMemorized || '0')} جزء</div>
            </div>
          </div>
        </div>

        <h5 class="fw-bold mt-4 mb-3"><i class="fa-solid fa-family"></i> بيانات ولي الأمر</h5>
        <div class="row g-3">
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label">الاسم الثلاثي</div>
              <div class="info-value">${escapeHtml(student.guardianName)}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label">رقم الجوال</div>
              <div class="info-value">${escapeHtml(student.guardianPhone)}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label">رقم الهوية</div>
              <div class="info-value">${escapeHtml(student.guardianId)}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="info-card">
              <div class="info-label">صلة القرابة</div>
              <div class="info-value">${escapeHtml(student.guardianRelation)}</div>
            </div>
          </div>
        </div>

        <div class="mt-4">
          <button class="btn btn-outline-primary" id="requestEditBtn">
            <i class="fa-solid fa-pen-to-square ms-1"></i>طلب تعديل بيانات
          </button>
        </div>
      </div>
    `;

    document.getElementById('requestEditBtn')?.addEventListener('click', () => showEditModal(student));
  }

  function showEditModal(student) {
    const editableFields = [
      { field: 'studentPhone', label: 'رقم جوال الطالب', current: student.studentPhone },
      { field: 'address', label: 'العنوان / الحي', current: student.address },
      { field: 'educationLevel', label: 'المرحلة الدراسية', current: student.educationLevel },
      { field: 'educationGrade', label: 'الصف الدراسي', current: student.educationGrade }
    ];

    Swal.fire({
      title: 'طلب تعديل بيانات',
      html: `
        <div class="text-start">
          ${editableFields.map(f => `
            <div class="mb-3">
              <label class="form-label fw-bold">${f.label}</label>
              <input type="text" id="field-${f.field}" class="swal2-input" value="${escapeHtml(f.current || '')}" placeholder="القيمة الجديدة">
            </div>
          `).join('')}
          <div class="mb-3">
            <label class="form-label fw-bold">ملاحظات (اختياري)</label>
            <textarea id="editNotes" class="swal2-textarea" rows="2" placeholder="سبب التعديل..."></textarea>
          </div>
        </div>
      `,
      confirmButtonText: 'إرسال الطلب',
      cancelButtonText: 'إلغاء',
      showCancelButton: true,
      preConfirm: () => {
        const updates = {};
        editableFields.forEach(f => {
          const val = document.getElementById(`field-${f.field}`).value;
          if (val && val !== f.current) updates[f.field] = val;
        });
        return { updates, notes: document.getElementById('editNotes').value };
      }
    }).then(async (result) => {
      if (result.isConfirmed && Object.keys(result.value.updates).length > 0) {
        showLoader(true);
        try {
          const params = new URLSearchParams();
          params.append('action', 'requestStudentUpdate');
          params.append('studentId', student.studentId);
          params.append('updates', JSON.stringify(result.value.updates));
          params.append('notes', result.value.notes);

          const response = await fetch(API_BASE, { method: 'POST', body: params });
          const data = await response.json();

          if (data.success) {
            Swal.fire('تم الإرسال', 'تم إرسال طلب التعديل بنجاح وسيتم مراجعته', 'success');
          } else {
            throw new Error(data.error);
          }
        } catch (err) {
          Swal.fire('خطأ', err.message, 'error');
        } finally {
          showLoader(false);
        }
      } else if (Object.keys(result.value?.updates || {}).length === 0) {
        Swal.fire('تنبيه', 'لم يتم إدخال أي تغييرات', 'info');
      }
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  document.getElementById('searchForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const studentId = formData.get('studentId');
    const guardianPhone = formData.get('guardianPhone');

    if (!studentId && !guardianPhone) {
      Swal.fire('تنبيه', 'يرجى إدخال هوية الطالب أو رقم جوال ولي الأمر', 'warning');
      return;
    }

    showLoader(true);
    try {
      const params = new URLSearchParams();
      params.append('action', 'getStudentData');
      if (studentId) params.append('studentId', studentId);
      if (guardianPhone) params.append('guardianPhone', guardianPhone);

      const response = await fetch(API_BASE, { method: 'POST', body: params });
      const result = await response.json();

      if (result.success) {
        renderStudentData(result.data);
      } else {
        throw new Error(result.error);
      }
    } catch (err) {
      document.getElementById('studentResult').innerHTML = `<div class="alert alert-danger">${escapeHtml(err.message)}</div>`;
    } finally {
      showLoader(false);
    }
  });

  // Add styles
  const style = document.createElement('style');
  style.textContent = `
    .info-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 12px 16px;
      border: 1px solid #e9ecef;
    }
    .info-label {
      font-size: 0.8rem;
      color: #6c757d;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .info-value {
      font-size: 1rem;
      font-weight: 700;
      color: #1e293b;
    }
    .student-info {
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  `;
  document.head.appendChild(style);
</script>
</body>
</html>
