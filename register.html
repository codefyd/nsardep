<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل طالب جديد | مجمع تحفيظ القرآن</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="globalLoader" class="global-loader d-none">
  <div class="spinner-border text-light" role="status"></div>
  <div class="mt-3">جاري المعالجة...</div>
</div>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-success" href="index.html">
      <i class="fa-solid fa-book-quran ms-2"></i>مجمع تحفيظ القرآن
    </a>
    <a href="index.html" class="btn btn-outline-success btn-sm">
      <i class="fa-solid fa-home ms-1"></i>الرئيسية
    </a>
  </div>
</nav>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-lg rounded-4">
        <div class="card-header bg-success text-white rounded-top-4 py-3">
          <h3 class="mb-0 fw-bold"><i class="fa-solid fa-user-plus ms-2"></i>تسجيل طالب جديد</h3>
          <small>سيتم مراجعة الطلب وإشعارك عند القبول</small>
        </div>
        <div class="card-body p-4">
          <form id="registrationForm">
            <h5 class="fw-bold mb-3"><i class="fa-solid fa-user-graduate text-success ms-2"></i>بيانات الطالب</h5>
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label fw-bold">اسم الطالب ثلاثي <span class="text-danger">*</span></label>
                <input type="text" name="studentName" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">هوية الطالب <span class="text-danger">*</span></label>
                <input type="text" name="studentId" class="form-control" pattern="\d{8,12}" inputmode="numeric" required>
                <small class="text-muted">8-12 رقم فقط</small>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">رقم جوال الطالب <span class="text-danger">*</span></label>
                <input type="tel" name="studentPhone" class="form-control" pattern="\d{10}" inputmode="numeric" required>
                <small class="text-muted">10 أرقام</small>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">تاريخ الميلاد <span class="text-danger">*</span></label>
                <input type="date" name="birthDate" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">العنوان / الحي <span class="text-danger">*</span></label>
                <input type="text" name="address" class="form-control" required>
              </div>
              <div class="col-md-3">
                <label class="form-label fw-bold">المرحلة الدراسية <span class="text-danger">*</span></label>
                <select id="educationLevel" name="educationLevel" class="form-select" required></select>
              </div>
              <div class="col-md-3">
                <label class="form-label fw-bold">الصف الدراسي <span class="text-danger">*</span></label>
                <select id="educationGrade" name="educationGrade" class="form-select" required></select>
              </div>
            </div>

            <h5 class="fw-bold mb-3"><i class="fa-solid fa-family text-success ms-2"></i>بيانات ولي الأمر</h5>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">اسم ولي الأمر ثلاثي <span class="text-danger">*</span></label>
                <input type="text" name="guardianName" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">رقم جوال ولي الأمر <span class="text-danger">*</span></label>
                <input type="tel" name="guardianPhone" class="form-control" pattern="\d{10}" inputmode="numeric" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">رقم هوية ولي الأمر <span class="text-danger">*</span></label>
                <input type="text" name="guardianId" class="form-control" pattern="\d{8,12}" inputmode="numeric" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">صلة ولي الأمر <span class="text-danger">*</span></label>
                <select id="guardianRelation" name="guardianRelation" class="form-select" required></select>
              </div>
            </div>

            <div class="alert alert-info mt-4">
              <i class="fa-solid fa-info-circle ms-2"></i>
              سيتم إنشاء طلب تسجيل جديد للمراجعة من قبل المشرفين، وسيتم إشعارك عند القبول.
            </div>

            <button type="submit" class="btn btn-success btn-lg w-100 mt-3">
              <i class="fa-solid fa-paper-plane ms-2"></i>إرسال طلب التسجيل
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  const API_BASE = API_URL;
  let publicSettings = {};

  async function loadSettings() {
    try {
      const res = await fetch(API_BASE + '?action=getPublicSettings');
      const data = await res.json();
      if (data.success) {
        publicSettings = data.data;
        fillSelect('educationLevel', publicSettings.generalLists?.educationLevels || []);
        fillSelect('educationGrade', publicSettings.generalLists?.educationGrades || []);
        fillSelect('guardianRelation', publicSettings.generalLists?.guardianRelations || ['أب', 'أخ', 'عم', 'خال', 'غير ذلك']);
      }
    } catch(e) { console.error(e); }
  }

  function fillSelect(id, items) {
    const select = document.getElementById(id);
    if (!select) return;
    select.innerHTML = '<option value="">اختر...</option>';
    items.forEach(item => {
      select.innerHTML += `<option value="${item}">${item}</option>`;
    });
  }

  function showLoader(show) {
    const loader = document.getElementById('globalLoader');
    if (show) loader.classList.remove('d-none');
    else loader.classList.add('d-none');
  }

  document.getElementById('registrationForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = {
      studentName: formData.get('studentName'),
      studentId: formData.get('studentId'),
      studentPhone: formData.get('studentPhone'),
      birthDate: formData.get('birthDate'),
      address: formData.get('address'),
      educationLevel: formData.get('educationLevel'),
      educationGrade: formData.get('educationGrade'),
      guardianName: formData.get('guardianName'),
      guardianPhone: formData.get('guardianPhone'),
      guardianId: formData.get('guardianId'),
      guardianRelation: formData.get('guardianRelation')
    };

    // Validation
    if (!/^\d{8,12}$/.test(data.studentId)) {
      Swal.fire('خطأ', 'رقم الهوية يجب أن يكون من 8 إلى 12 رقم', 'error');
      return;
    }
    if (!/^\d{10}$/.test(data.studentPhone)) {
      Swal.fire('خطأ', 'رقم الجوال يجب أن يكون 10 أرقام', 'error');
      return;
    }
    if (!/^\d{10}$/.test(data.guardianPhone)) {
      Swal.fire('خطأ', 'رقم جوال ولي الأمر يجب أن يكون 10 أرقام', 'error');
      return;
    }

    showLoader(true);
    try {
      const params = new URLSearchParams();
      params.append('action', 'registerStudent');
      Object.entries(data).forEach(([k, v]) => params.append(k, v));

      const response = await fetch(API_BASE, { method: 'POST', body: params });
      const result = await response.json();

      if (result.success) {
        Swal.fire({
          icon: 'success',
          title: 'تم إرسال الطلب بنجاح',
          html: `رقم الطلب: <strong>${result.data.requestId}</strong><br>سيتم التواصل معكم بعد المراجعة`,
          confirmButtonText: 'حسناً'
        }).then(() => {
          e.target.reset();
        });
      } else {
        throw new Error(result.error || 'حدث خطأ');
      }
    } catch (err) {
      Swal.fire('خطأ', err.message, 'error');
    } finally {
      showLoader(false);
    }
  });

  loadSettings();
</script>
</body>
</html>
