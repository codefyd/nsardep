<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول العاملين | مجمع تحفيظ القرآن</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="globalLoader" class="global-loader d-none">
  <div class="spinner-border text-light" role="status"></div>
  <div class="mt-3">جاري تسجيل الدخول...</div>
</div>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="bg-success p-4 text-center">
          <i class="fa-solid fa-quran fa-3x text-white mb-2"></i>
          <h3 class="text-white mb-0">مرحباً بك</h3>
          <p class="text-white-50 mb-0">سجل دخولك للوصول إلى لوحة التحكم</p>
        </div>
        <div class="card-body p-4">
          <form id="loginForm">
            <div class="mb-4">
              <label class="form-label fw-bold"><i class="fa-solid fa-key ms-1"></i>رمز الدخول</label>
              <input type="password" id="accessCode" class="form-control form-control-lg" placeholder="أدخل الرمز المخصص" required>
            </div>
            <button type="submit" class="btn btn-success btn-lg w-100">
              <i class="fa-solid fa-sign-in-alt ms-2"></i>دخول
            </button>
          </form>
          <hr class="my-4">
          <div class="text-center">
            <a href="index.html" class="text-decoration-none">
              <i class="fa-solid fa-home ms-1"></i>العودة للرئيسية
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  const API_BASE = API_URL;

  function showLoader(show) {
    const loader = document.getElementById('globalLoader');
    if (show) loader.classList.remove('d-none');
    else loader.classList.add('d-none');
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = document.getElementById('accessCode').value.trim();

    if (!code) {
      Swal.fire('تنبيه', 'يرجى إدخال رمز الدخول', 'warning');
      return;
    }

    showLoader(true);
    try {
      const params = new URLSearchParams();
      params.append('action', 'staffLogin');
      params.append('accessCode', code);

      const response = await fetch(API_BASE, { method: 'POST', body: params });
      const result = await response.json();

      if (result.success) {
        // Store session
        localStorage.setItem('quran_session', JSON.stringify({
          token: result.data.token,
          userName: result.data.userName,
          userRole: result.data.userRole,
          userCircle: result.data.userCircle || ''
        }));

        Swal.fire({
          icon: 'success',
          title: 'تم تسجيل الدخول',
          text: `مرحباً ${result.data.userName}`,
          timer: 1500,
          showConfirmButton: false
        }).then(() => {
          window.location.href = 'dashboard.html';
        });
      } else {
        throw new Error(result.error || 'رمز الدخول غير صحيح');
      }
    } catch (err) {
      Swal.fire('خطأ', err.message, 'error');
    } finally {
      showLoader(false);
    }
  });
</script>
</body>
</html>
